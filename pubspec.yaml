name: teamtask
description: TeamTask - Sprint Autenticación
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (incluye Auth con OAuth)
  supabase_flutter: ^2.3.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: 13.2.2

  # UI
  flutter_animate: ^4.3.0
  gap: ^3.0.1
  font_awesome_flutter: ^10.7.0   # Íconos de GitHub, Apple, Google
  image_picker: ^1.0.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

