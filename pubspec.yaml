name: teamtask
description: TeamTask - Sprint Autenticación
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (incluye Auth con OAuth)
  supabase_flutter: ^2.8.0
  app_links: ^6.0.0
  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: 13.2.2

  timeago: ^3.7.0

  # UI
  flutter_animate: ^4.3.0
  gap: ^3.0.1
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.0.7
  fl_chart: ^0.69.0

  # Notificaciones locales
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/icons/Teamtask.png"